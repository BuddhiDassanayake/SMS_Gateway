<!-- public/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout</title>
    <script type="text/javascript" src="https://www.payhere.lk/lib/payhere.js"></script>
    <style>
        :root { --primary: #0F172A; --accent: #3B82F6; --bg: #F8FAFC; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        .checkout-card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; transition: all 0.3s ease; }
        .product-img { width: 80px; height: 80px; background: #E2E8F0; border-radius: 50%; display: flex; justify-content: center; align-items: center; margin: 0 auto 20px; font-size: 30px; }
        h2 { color: var(--primary); margin-bottom: 5px; }
        .price { font-size: 32px; font-weight: bold; color: var(--primary); margin: 20px 0; }
        .price span { font-size: 16px; color: #64748B; font-weight: normal; }
        
        .pay-btn { background: var(--accent); color: white; width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s; display: flex; justify-content: center; align-items: center; gap: 10px;}
        .pay-btn:hover { background: #2563EB; }
        .pay-btn:disabled { background: #94A3B8; cursor: not-allowed; }
        
        .spinner { border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top: 3px solid white; width: 20px; height: 20px; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Success State UI */
        .success-ui { display: none; }
        .success-icon { font-size: 50px; color: #10B981; margin-bottom: 15px; }
        .order-badge { background: #F1F5F9; color: #475569; padding: 8px 15px; border-radius: 20px; font-size: 14px; margin-top: 20px; display: inline-block; }
    </style>
</head>
<body>

    <div class="checkout-card" id="card-container">
        <!-- Checkout State -->
        <div id="checkout-ui">
            <div class="product-img">🎓</div>
            <h2>Premium UI/UX Course</h2>
            <p style="color: #64748B;">Complete lifetime access</p>
            <div class="price">2,500 <span>LKR</span></div>
            <button class="pay-btn" id="pay-btn" onclick="initiateCheckout()">
                <span class="spinner" id="spinner"></span>
                <span id="btn-text">Proceed to Payment</span>
            </button>
        </div>

        <!-- Success State -->
        <div class="success-ui" id="success-ui">
            <div class="success-icon">✅</div>
            <h2>Payment Successful!</h2>
            <p style="color: #64748B;">Thank you for your purchase.</p>
            <div class="order-badge">Order ID: <strong id="display-order-id"></strong></div>
        </div>
    </div>

    <script>
        // 1. Handle PayHere Callbacks
        payhere.onCompleted = function (orderId) {
            console.log("Frontend: Payment completed. OrderID:" + orderId);
            // Hide checkout, show success UI
            document.getElementById('checkout-ui').style.display = 'none';
            document.getElementById('success-ui').style.display = 'block';
            document.getElementById('display-order-id').innerText = orderId;
        };

        payhere.onDismissed = function () {
            console.log("Frontend: Payment dismissed");
            resetButton();
        };

        payhere.onError = function (error) {
            console.log("Frontend Error: " + error);
            alert("Payment failed: " + error);
            resetButton();
        };

        // 2. Fetch Hash and Initiate Payment
        async function initiateCheckout() {
            const btn = document.getElementById('pay-btn');
            const btnText = document.getElementById('btn-text');
            const spinner = document.getElementById('spinner');

            // UI Loading state
            btn.disabled = true;
            btnText.innerText = "Generating Secure Session...";
            spinner.style.display = "block";

            try {
                // Fetch dynamically generated payment payload from our backend
                const response = await fetch('/api/create-payment');
                const paymentData = await response.json();

                // Pass the payload to PayHere
                payhere.startPayment(paymentData);
                
                // Reset button text while payment popup is open
                btnText.innerText = "Awaiting Payment...";
                spinner.style.display = "none";
            } catch (error) {
                console.error("Failed to initiate payment:", error);
                alert("Failed to connect to the server.");
                resetButton();
            }
        }

        function resetButton() {
            const btn = document.getElementById('pay-btn');
            btn.disabled = false;
            document.getElementById('btn-text').innerText = "Proceed to Payment";
            document.getElementById('spinner').style.display = "none";
        }
    </script>
</body>
</html>
