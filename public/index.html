<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayHere Payment Demo</title>

    <!-- PayHere Sandbox SDK -->
    <script src="https://www.payhere.lk/lib/payhere.js"></script>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f5f5f5;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .card{
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,.2);
            text-align:center;
            width:350px;
        }

        button{
            background:#28a745;
            color:white;
            border:none;
            padding:15px 30px;
            font-size:18px;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#218838;
        }

        pre{
            text-align:left;
            background:#eee;
            padding:10px;
            margin-top:20px;
            overflow:auto;
        }
    </style>
</head>
<body>

<div class="card">

    <h2>PayHere Demo</h2>

    <p>Amount : <strong>LKR 2500.00</strong></p>

    <button id="payBtn">
        Pay Now
    </button>

    <pre id="output"></pre>

</div>

<script>

const output = document.getElementById("output");

payhere.onCompleted = function(orderId){

    console.log("Payment completed");

    console.log(orderId);

    output.textContent =
        "Payment Completed\nOrder ID : " + orderId;
};

payhere.onDismissed = function(){

    console.log("Payment dismissed");

    output.textContent =
        "Payment Cancelled";
};

payhere.onError = function(error){

    console.log(error);

    output.textContent =
        "Payment Error\n\n" + error;
};

document.getElementById("payBtn").onclick = async function(){

    output.textContent = "Loading payment...";

    try{

        const response = await fetch("/api/payment/init");

        const payment = await response.json();

        console.log(payment);

        output.textContent =
            JSON.stringify(payment,null,4);

        payhere.startPayment(payment);

    }catch(err){

        console.error(err);

        output.textContent =
            err.message;
    }

};

</script>

</body>
</html>
